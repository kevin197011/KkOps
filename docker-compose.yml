services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: kkops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kkops
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kkops-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: kkops-redis
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kkops-network

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kkops-backend
    environment:
      # 时区配置
      TZ: Asia/Shanghai
      # 服务器配置
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: kkops
      DB_SSLMODE: disable
      # JWT 配置
      JWT_SECRET: your-secret-key-change-in-production-please-use-strong-secret
      # Salt 配置
      SALT_API_URL: http://192.168.56.10:8000
      SALT_USERNAME: salt
      SALT_PASSWORD: salt123
      SALT_EAUTH: pam
      SALT_VERIFY_SSL: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kkops-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端 Web 服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kkops-frontend
    environment:
      TZ: Asia/Shanghai
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kkops-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  kkops-network:
    driver: bridge

