<svg width="180" height="56" viewBox="0 0 180 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 现代渐变 - 专业科技蓝 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>

    <!-- 辅助渐变 - 优雅紫色 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>

    <!-- 柔和阴影 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(37,99,235,0.15)"/>
    </filter>

    <!-- 微妙的内阴影 -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 主容器背景 -->
  <rect width="180" height="56" rx="12" fill="#ffffff" filter="url(#softShadow)"/>
  <rect x="4" y="4" width="172" height="48" rx="8" fill="#f8fafc"/>
  <rect x="6" y="6" width="168" height="44" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 装饰性背景元素 -->
  <circle cx="20" cy="16" r="8" fill="url(#primaryGradient)" opacity="0.05"/>
  <circle cx="160" cy="40" r="12" fill="url(#accentGradient)" opacity="0.04"/>

  <!-- K字母 - 现代几何设计 -->
  <g transform="translate(24,12)">
    <!-- K的主体线条 -->
    <rect x="0" y="0" width="8" height="32" rx="2" fill="url(#primaryGradient)"/>
    <!-- K的上分支 -->
    <path d="M8 4 L20 4 L20 10 L8 10 Z" fill="url(#primaryGradient)" rx="2"/>
    <!-- K的下分支 -->
    <path d="M8 22 L18 32 L18 26 L8 26 Z" fill="url(#primaryGradient)" rx="2"/>
    <!-- K的装饰点 -->
    <circle cx="4" cy="8" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="4" cy="24" r="2" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- k字母 - 优雅小写设计 -->
  <g transform="translate(52,12)">
    <!-- k的主体 -->
    <rect x="0" y="0" width="6" height="32" rx="1.5" fill="url(#primaryGradient)"/>
    <!-- k的上分支 -->
    <path d="M6 8 L14 8 L14 12 L6 12 Z" fill="url(#primaryGradient)" rx="1"/>
    <!-- k的下分支 -->
    <path d="M6 20 L12 32 L12 26 L6 26 Z" fill="url(#primaryGradient)" rx="1"/>
    <!-- k的装饰曲线 -->
    <path d="M8 14 Q10 18 8 22" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <!-- O字母 - 完美圆形设计 -->
  <g transform="translate(78,12)">
    <!-- O的外环 -->
    <circle cx="16" cy="16" r="15" fill="none" stroke="url(#primaryGradient)" stroke-width="6"/>
    <!-- O的内环 -->
    <circle cx="16" cy="16" r="9" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
    <!-- O的装饰点 -->
    <circle cx="16" cy="8" r="1.5" fill="url(#accentGradient)" opacity="0.8"/>
    <circle cx="16" cy="24" r="1.5" fill="#60a5fa" opacity="0.6"/>
  </g>

  <!-- P字母 - 专业设计 -->
  <g transform="translate(110,12)">
    <!-- P的主体 -->
    <rect x="0" y="0" width="6" height="32" rx="1.5" fill="url(#primaryGradient)"/>
    <!-- P的上横 -->
    <rect x="6" y="0" width="12" height="8" rx="2" fill="url(#primaryGradient)"/>
    <!-- P的下横 -->
    <rect x="6" y="12" width="10" height="6" rx="1" fill="url(#primaryGradient)"/>
    <!-- P的装饰弧线 -->
    <path d="M6 8 Q14 8 14 16" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <!-- S字母 - 流畅曲线设计 -->
  <g transform="translate(140,12)">
    <!-- S的上横 -->
    <rect x="0" y="0" width="12" height="6" rx="2" fill="url(#primaryGradient)"/>
    <!-- S的左弯 -->
    <rect x="0" y="6" width="6" height="8" rx="1" fill="url(#primaryGradient)"/>
    <!-- S的右弯 -->
    <rect x="6" y="14" width="8" height="6" rx="1" fill="url(#primaryGradient)"/>
    <!-- S的下横 -->
    <rect x="0" y="20" width="14" height="6" rx="2" fill="url(#primaryGradient)"/>
    <!-- S的连接弧线 -->
    <path d="M6 6 Q12 10 6 14" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M8 20 Q2 24 8 28" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <!-- Ops文字 - 优雅字体 -->
  <text x="24" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="500" fill="url(#accentGradient)">Ops</text>

  <!-- 装饰性几何元素 -->
  <rect x="8" y="8" width="4" height="4" rx="1" fill="url(#primaryGradient)" opacity="0.3"/>
  <rect x="168" y="44" width="4" height="4" rx="1" fill="url(#accentGradient)" opacity="0.3"/>
  <circle cx="12" cy="44" r="2" fill="#60a5fa" opacity="0.4"/>
  <circle cx="168" cy="12" r="2" fill="#a855f7" opacity="0.4"/>
</svg>